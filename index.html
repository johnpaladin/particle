<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#05060a">
<title>手勢聚氣占卜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05060a;
    --panel:#0d0b12;
    --gold:#d4af7a;
    --gold-dim:#8a7350;
    --ink:#e8e0d0;
    --danger:#3a0d0d;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:var(--bg); color:var(--ink); overflow:hidden;
    font-family:"Noto Serif TC", "PMingLiU", "Songti TC", serif;
    -webkit-tap-highlight-color:transparent;
  }
  #stageWrap{position:fixed; inset:0; overflow:hidden;}
  #cam, #stage{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform:scaleX(-1); /* mirror front camera; canvas is drawn in raw video-pixel space, so mirroring the whole element mirrors the particles with it automatically */
  }
  #cam{ filter:brightness(0.5) saturate(0.75) contrast(1.05); background:#000; }
  #stage{ pointer-events:none; }

  #title{
    position:fixed; top:max(18px, env(safe-area-inset-top)); left:0; right:0;
    text-align:center; pointer-events:none; z-index:5;
  }
  #title h1{
    margin:0; font-size:18px; font-weight:600; letter-spacing:0.35em;
    color:var(--gold); text-shadow:0 0 18px rgba(212,175,122,0.5);
    opacity:0.85;
  }

  #status{
    position:fixed; left:max(14px, env(safe-area-inset-left)); bottom:max(14px, env(safe-area-inset-bottom));
    font-family:monospace, "Noto Serif TC", serif;
    font-size:12px; letter-spacing:0.05em; color:var(--gold-dim);
    background:rgba(5,6,10,0.45); padding:6px 10px; border-radius:6px;
    z-index:5; pointer-events:none;
  }

  #errorBanner{
    display:none; position:fixed; top:0; left:0; right:0; z-index:50;
    background:var(--danger); color:#fdeaea; padding:14px 18px;
    font-size:14px; line-height:1.6; text-align:center;
    border-bottom:1px solid #7a1f1f;
  }

  #startScreen{
    position:fixed; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, #14101c 0%, #05060a 75%);
    padding:24px; text-align:center;
    transition:opacity 0.6s ease;
  }
  #startScreen.hidden{ opacity:0; pointer-events:none; }
  .start-inner{ max-width:420px; }
  .start-inner h1{
    font-size:26px; letter-spacing:0.3em; color:var(--gold);
    margin:0 0 18px; text-shadow:0 0 24px rgba(212,175,122,0.45);
  }
  .start-inner p{ font-size:14.5px; line-height:1.9; color:var(--ink); opacity:0.85; margin:0 0 22px; }
  .start-inner p.hint{ font-size:12px; opacity:0.55; margin-top:18px; }
  #startBtn{
    font-family:inherit; font-size:16px; letter-spacing:0.2em;
    padding:12px 34px; border-radius:999px;
    background:transparent; color:var(--gold);
    border:1px solid var(--gold-dim);
    cursor:pointer; transition:all 0.25s ease;
  }
  #startBtn:not(:disabled):hover{ background:rgba(212,175,122,0.1); box-shadow:0 0 24px rgba(212,175,122,0.35); }
  #startBtn:disabled{ opacity:0.5; cursor:default; }

  #cardPanel{
    position:fixed; inset:0; z-index:15;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; padding:20px;
    background:rgba(0,0,0,0.7);
    opacity:0; pointer-events:none;
    transition:opacity 0.9s ease;
  }
  #cardPanel.show{ opacity:1; pointer-events:auto; }
  .card{
    width:min(340px, 86vw); max-height:78vh; overflow-y:auto;
    background:linear-gradient(180deg, rgba(20,16,26,0.95), rgba(10,8,13,0.97));
    border:1px solid rgba(212,175,122,0.5);
    border-radius:14px; padding:26px 22px 22px;
    box-shadow:0 0 50px rgba(212,175,122,0.18), inset 0 0 30px rgba(212,175,122,0.06);
    text-align:center;
    transform:translateY(14px) scale(0.97);
    transition:transform 0.9s cubic-bezier(.2,.9,.25,1);
  }
  #cardPanel.show .card{ transform:translateY(0) scale(1); }
  .card-icon-svg{ width:88px; height:88px; margin-bottom:6px; color:var(--gold); }
  .card-icon-svg *{ fill:none; stroke:var(--gold); stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
  .card-num{ font-size:11px; letter-spacing:0.25em; color:var(--gold-dim); margin-bottom:8px; }
  .card-name{ font-size:26px; margin:0 0 2px; color:var(--ink); font-weight:700; letter-spacing:0.08em; }
  .card-trad{ font-size:12px; letter-spacing:0.1em; color:var(--gold-dim); margin-bottom:14px; font-style:italic; }
  .card-keyword{
    display:inline-block; font-size:13px; letter-spacing:0.15em;
    color:var(--bg); background:var(--gold); padding:3px 14px;
    border-radius:999px; margin-bottom:16px;
  }
  .card-text{ font-size:14.5px; line-height:2; color:var(--ink); opacity:0.9; margin:0; text-align:left; }
  #redrawBtn{
    font-family:inherit; font-size:14px; letter-spacing:0.2em;
    padding:10px 30px; border-radius:999px;
    background:transparent; color:var(--gold);
    border:1px solid var(--gold-dim); cursor:pointer;
    transition:all 0.25s ease;
  }
  #redrawBtn:hover{ background:rgba(212,175,122,0.1); box-shadow:0 0 20px rgba(212,175,122,0.3); }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:opacity 0.4s ease; }
    #cardPanel{ transition:opacity 0.4s ease; }
  }
</style>
</head>
<body>

  <div id="stageWrap">
    <video id="cam" autoplay muted playsinline></video>
    <canvas id="stage"></canvas>
  </div>

  <header id="title"><h1>手勢聚氣占卜</h1></header>
  <div id="status">充能 0% · 偵測到 0 隻手</div>
  <div id="errorBanner" role="alert"></div>

  <div id="startScreen">
    <div class="start-inner">
      <h1>手勢聚氣占卜</h1>
      <p>雙手於胸前靠近,以手背相貼、掌心朝外的<br>不自然姿勢緩緩聚氣。<br>充滿並停留片刻,即可抽出一張命運之牌。</p>
      <button id="startBtn">開始占卜</button>
      <p class="hint">需要開啟相機權限。影像僅在裝置本機端運算,不會上傳或儲存。</p>
    </div>
  </div>

  <div id="cardPanel" class="card-overlay">
    <div class="card" id="cardBody"></div>
    <button id="redrawBtn">再抽一次</button>
  </div>

/* ---------- DOM ---------- */
const video = document.getElementById('cam');
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const errorBanner = document.getElementById('errorBanner');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const cardPanel = document.getElementById('cardPanel');
const cardBody = document.getElementById('cardBody');
const redrawBtn = document.getElementById('redrawBtn');

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- 常數 ---------- */
const CHARGE_THRESH = 2.5;      // 兩掌根(手腕)距離 / 單手掌寬 的正規化閾值
const CHARGE_MIN_RATE = 6;      // %/秒,剛進入閾值時的充能速度
const CHARGE_MAX_RATE = 55;     // %/秒,兩掌根完全貼近且手背朝外時的充能速度
const DECAY_RATE = 18;          // %/秒,手分開或姿勢不對時的衰減速度(漸進,不瞬間歸零)
const HOLD_MS = 800;            // 充滿後需維持的時間
// 手背相貼的「朝向」判定是用 2D 叉積估計，實機測試方向若相反，把這個值改成 -1 即可，不必動其他數學
const BACK_ORIENTATION_SIGN = 1;
const PARTICLE_COUNT = reducedMotion ? 140 : 420;

/* ---------- 狀態 ---------- */
let handLandmarker = null;
let running = false;
let lastTs = performance.now();

const state = {
  numHands: 0,
  charge: 0,
  chargeHoldStart: null,
  entropyAcc: 0x9e3779b9 >>> 0,
  phase: 'gathering', // gathering -> collapsing -> bursting -> revealed
  phaseStart: 0,
  drawnCardIndex: null,
  center: {x:0, y:0},      // 目前繪製用的（平滑後）中心
  targetCenter: {x:0, y:0} // 由手勢決定的目標中心
};

let particles = [];

/* ---------- 工具函式 ---------- */
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

function palmWidthPx(lm, vw, vh){
  const a = lm[5], b = lm[17];
  return Math.hypot((a.x-b.x)*vw, (a.y-b.y)*vh);
}
function wristPx(lm, vw, vh){
  return {x: lm[0].x*vw, y: lm[0].y*vh};
}
/*
 * 估計「手背是否朝向鏡頭」：用手腕(0)→食指根(5)與手腕(0)→小指根(17)兩個向量的
 * 2D 叉積正負號，判斷目前看到的是掌心還是手背；左右手的叉積正負相反，需搭配
 * handedness 校正。這只是幾何近似（單眼深度不可靠），回傳 0~1，1 代表手背朝鏡頭。
 * 如果實機測試發現方向相反，調整上方的 BACK_ORIENTATION_SIGN 即可。
 */
function backFacingFactor(lm, vw, vh, handednessLabel, palmWidth){
  const wrist = {x: lm[0].x*vw, y: lm[0].y*vh};
  const idxMcp = {x: lm[5].x*vw, y: lm[5].y*vh};
  const pinkyMcp = {x: lm[17].x*vw, y: lm[17].y*vh};
  const v1x = idxMcp.x-wrist.x, v1y = idxMcp.y-wrist.y;
  const v2x = pinkyMcp.x-wrist.x, v2y = pinkyMcp.y-wrist.y;
  const cross = v1x*v2y - v1y*v2x;
  const handSign = handednessLabel === 'Right' ? 1 : -1;
  const normalized = (cross*handSign*BACK_ORIENTATION_SIGN) / Math.max(1, palmWidth*palmWidth);
  return clamp(-normalized*2.2, 0, 1);
}

/* xorshift32 混合，把手勢座標的低位小數位混進 32-bit 熵池（不使用 Math.random） */
function mixEntropy(landmarks){
  let acc = state.entropyAcc;
  for(const lm of landmarks){
    for(const coord of [lm.x, lm.y, lm.z || 0]){
      const frac = (coord*1e6) % 1;
      const bits = Math.floor(Math.abs(frac) * 4294967296) >>> 0;
      acc = (acc ^ bits) >>> 0;
      acc ^= acc << 13; acc >>>= 0;
      acc ^= acc >>> 17;
      acc ^= acc << 5;  acc >>>= 0;
    }
  }
  state.entropyAcc = acc >>> 0;
}

/* mulberry32：以熵池數值作種子的決定性 PRNG，只在抽牌那一刻使用一次 */
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ---------- 錯誤處理 ---------- */
function showError(msg){
  errorBanner.textContent = msg;
  errorBanner.style.display = 'block';
}
function friendlyError(err){
  const name = err && err.name;
  if(name === 'NotAllowedError' || name === 'PermissionDeniedError'){
    return '未取得相機權限。請在瀏覽器設定中允許存取相機後,重新整理頁面再試一次。';
  }
  if(name === 'NotFoundError' || name === 'DevicesNotFoundError'){
    return '找不到可用的相機裝置。';
  }
  if(name === 'NotReadableError'){
    return '相機目前無法使用,可能已被其他應用程式佔用。';
  }
  return '初始化失敗:' + (err && err.message ? err.message : String(err));
}

/* ---------- 相機 ---------- */
async function initCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width:{ideal:640}, height:{ideal:480} },
    audio: false
  });
  video.srcObject = stream;
  await new Promise((resolve) => {
    video.onloadedmetadata = () => resolve();
  });
  await video.play();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  state.center.x = state.targetCenter.x = canvas.width/2;
  state.center.y = state.targetCenter.y = canvas.height/2;
}

/* ---------- MediaPipe HandLandmarker ---------- */
async function initHandLandmarker(){
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm"
  );
  const modelAssetPath = "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task";
  try{
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath, delegate: "GPU" },
      runningMode: "VIDEO",
      numHands: 2
    });
  }catch(e){
    console.warn('GPU delegate 失敗，改用 CPU delegate', e);
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath, delegate: "CPU" },
      runningMode: "VIDEO",
      numHands: 2
    });
  }
}

/* ---------- 粒子系統 ---------- */
function initParticles(){
  particles = Array.from({length: PARTICLE_COUNT}, () => ({
    angle: Math.random()*Math.PI*2,     // 僅用於初始外觀散佈，與抽牌結果無關
    radius: 140 + Math.random()*160,
    speed: 0.25 + Math.random()*0.55,
    depth: Math.random(),
    x: 0, y: 0, hue: 210, alpha: 0.4
  }));
}

function updateParticles(dtSec){
  const chargeF = state.charge/100;
  const baseRadius = lerp(230, 80, chargeF);
  const now = performance.now();
  const motionScale = reducedMotion ? 0.4 : 1;

  for(const p of particles){
    let targetR = baseRadius + p.depth*36;
    let angSpeed = p.speed * (0.4 + chargeF*1.6) * motionScale;

    if(state.phase === 'collapsing'){
      const t = clamp((now - state.phaseStart)/400, 0, 1);
      targetR = baseRadius * (1-t);
      angSpeed *= 3;
    } else if(state.phase === 'bursting'){
      const t = clamp((now - state.phaseStart)/500, 0, 1);
      targetR = 30 + t*260;
      angSpeed *= 2.2;
    } else if(state.phase === 'revealed'){
      targetR = 250 + p.depth*70;
      angSpeed *= 0.25;
    }

    p.angle += angSpeed * dtSec;
    const damp = 1 - Math.pow(0.001, dtSec); // 阻尼：dt 越大追得越快，與畫面更新率無關
    p.radius += (targetR - p.radius) * damp;
    p.x = state.center.x + Math.cos(p.angle) * p.radius;
    p.y = state.center.y + Math.sin(p.angle) * p.radius;
    p.hue = lerp(210, 45, chargeF);

    if(state.phase === 'bursting'){
      const t = clamp((now - state.phaseStart)/500, 0, 1);
      p.alpha = Math.max(0, 1 - t);
    } else if(state.phase === 'revealed'){
      p.alpha = 0.18 + p.depth*0.12;
    } else {
      p.alpha = 0.32 + chargeF*0.6;
    }
  }
}

function renderParticles(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = 'lighter';
  const chargeF = state.charge/100;
  for(const p of particles){
    const r = 1.6 + p.depth*1.4 + chargeF*3.2;
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r*3.2);
    grad.addColorStop(0, `hsla(${p.hue}, 90%, 72%, ${p.alpha})`);
    grad.addColorStop(1, `hsla(${p.hue}, 90%, 50%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r*3.2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

/* ---------- 手勢處理與充能邏輯 ---------- */
function processHands(result, dtSec){
  const hands = result.landmarks || [];
  const handedness = result.handedness || [];
  state.numHands = hands.length;
  const vw = video.videoWidth, vh = video.videoHeight;

  if(hands.length >= 2){
    const wristA = wristPx(hands[0], vw, vh);
    const wristB = wristPx(hands[1], vw, vh);
    const widthA = palmWidthPx(hands[0], vw, vh);
    const widthB = palmWidthPx(hands[1], vw, vh);
    const avgWidth = Math.max(1, (widthA+widthB)/2);
    const wristDist = Math.hypot(wristA.x-wristB.x, wristA.y-wristB.y);
    const normDist = wristDist/avgWidth;

    // 手背貼手背的不自然手勢：掌根（手腕）靠近，同時兩手的手背朝向鏡頭
    const labelA = (handedness[0] && handedness[0][0] && handedness[0][0].categoryName) || 'Right';
    const labelB = (handedness[1] && handedness[1][0] && handedness[1][0].categoryName) || 'Right';
    const backA = backFacingFactor(hands[0], vw, vh, labelA, widthA);
    const backB = backFacingFactor(hands[1], vw, vh, labelB, widthB);
    const orientationFactor = backA * backB;

    // 粒子聚集點：兩掌根的中點，對應手勢中符文浮現的位置
    state.targetCenter.x = (wristA.x+wristB.x)/2;
    state.targetCenter.y = (wristA.y+wristB.y)/2;

    if(state.phase === 'gathering'){
      if(normDist < CHARGE_THRESH && orientationFactor > 0){
        const closeness = clamp((CHARGE_THRESH-normDist)/CHARGE_THRESH, 0, 1);
        const rate = lerp(CHARGE_MIN_RATE, CHARGE_MAX_RATE, closeness) * orientationFactor;
        state.charge = clamp(state.charge + rate*dtSec, 0, 100);
      } else {
        state.charge = clamp(state.charge - DECAY_RATE*dtSec, 0, 100);
      }
    }
    mixEntropy(hands[0]);
    mixEntropy(hands[1]);
  } else if(hands.length === 1){
    state.targetCenter = wristPx(hands[0], vw, vh);
    if(state.phase === 'gathering'){
      state.charge = clamp(state.charge - DECAY_RATE*dtSec, 0, 100);
    }
    mixEntropy(hands[0]);
  } else {
    if(state.phase === 'gathering'){
      state.charge = clamp(state.charge - DECAY_RATE*dtSec, 0, 100);
    }
  }

  // 充能維持觸發判定
  if(state.phase === 'gathering'){
    if(state.charge >= 100){
      if(state.chargeHoldStart === null) state.chargeHoldStart = performance.now();
      else if(performance.now() - state.chargeHoldStart >= HOLD_MS){
        triggerDraw();
      }
    } else {
      state.chargeHoldStart = null;
    }
  }
}

function triggerDraw(){
  state.phase = 'collapsing';
  state.phaseStart = performance.now();
  const seed = state.entropyAcc || 0x1234abcd;
  const rand = mulberry32(seed);
  state.drawnCardIndex = Math.floor(rand() * CARDS.length);
}

function renderCard(idx){
  const c = CARDS[idx];
  cardBody.innerHTML = `
    <svg class="card-icon-svg" viewBox="0 0 100 100">${c.svg}</svg>
    <div class="card-num">第 ${String(c.id).padStart(2,'0')} 號</div>
    <h2 class="card-name">${c.zh}</h2>
    <div class="card-trad">${c.trad}</div>
    <div class="card-keyword">${c.kw}</div>
    <p class="card-text">${c.text}</p>
  `;
}

function updateStatusUI(){
  statusEl.textContent = `充能 ${Math.round(state.charge)}% · 偵測到 ${state.numHands} 隻手`;
}

/* ---------- 主迴圈 ---------- */
function frameLoop(ts){
  const dtSec = clamp((ts - lastTs)/1000, 0, 0.05);
  lastTs = ts;

  if(handLandmarker && video.readyState >= 2){
    const result = handLandmarker.detectForVideo(video, ts);
    processHands(result, dtSec);
  }

  // 平滑中心點，避免抖動
  state.center.x = lerp(state.center.x, state.targetCenter.x, 0.18);
  state.center.y = lerp(state.center.y, state.targetCenter.y, 0.18);

  // 階段轉換
  const now = performance.now();
  if(state.phase === 'collapsing' && now - state.phaseStart >= 400){
    state.phase = 'bursting';
    state.phaseStart = now;
  } else if(state.phase === 'bursting' && now - state.phaseStart >= 500){
    state.phase = 'revealed';
    state.phaseStart = now;
    renderCard(state.drawnCardIndex);
    cardPanel.classList.add('show');
    state.charge = 0;
    state.chargeHoldStart = null;
  }

  updateParticles(dtSec);
  renderParticles();
  updateStatusUI();

  if(running) requestAnimationFrame(frameLoop);
}

/* ---------- 事件 ---------- */
redrawBtn.addEventListener('click', () => {
  cardPanel.classList.remove('show');
  state.phase = 'gathering';
  state.charge = 0;
  state.chargeHoldStart = null;
});

startBtn.addEventListener('click', async () => {
  if(!window.isSecureContext){
    showError('此頁面需要透過 HTTPS 安全連線開啟才能使用相機權限（GitHub Pages 預設即為 HTTPS）。');
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showError('此瀏覽器不支援相機存取（getUserMedia）,請改用較新版本的 Chrome、Safari 或 Edge。');
    return;
  }
  startBtn.disabled = true;
  startBtn.textContent = '啟動中…';
  try{
    await Promise.all([initCamera(), initHandLandmarker()]);
    initParticles();
    startScreen.classList.add('hidden');
    running = true;
    lastTs = performance.now();
    requestAnimationFrame(frameLoop);
  }catch(err){
    console.error(err);
    showError(friendlyError(err));
    startBtn.disabled = false;
    startBtn.textContent = '重新開始';
  }
});

/* 頁面載入時先行檢查安全連線 */
if(!window.isSecureContext){
  showError('此頁面需要透過 HTTPS 安全連線開啟才能使用相機權限（GitHub Pages 預設即為 HTTPS）。');
  startBtn.disabled = true;
}
</script>
</body>
